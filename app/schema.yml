openapi: 3.0.3
info:
  title: Инвентаризация и продажи
  version: 1.0.0
  description: 'API: компании, склады, аутентификация (этап 1).'
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTokenObtainPair'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/companies/:
    post:
      operationId: companies_create
      tags:
      - companies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Company'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Company'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Company'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
  /api/companies/{id}/:
    get:
      operationId: companies_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Компания.
        required: true
      tags:
      - companies
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
    put:
      operationId: companies_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Компания.
        required: true
      tags:
      - companies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Company'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Company'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Company'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
    patch:
      operationId: companies_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Компания.
        required: true
      tags:
      - companies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCompany'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCompany'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCompany'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
          description: ''
    delete:
      operationId: companies_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Компания.
        required: true
      tags:
      - companies
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/companies/{id}/attach-user-to-company/:
    get:
      operationId: companies_attach_user_to_company_list
      description: Только владелец компании. Владелец в списке не отображается.
      summary: Список сотрудников компании
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Компания.
        required: true
      tags:
      - companies
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmployeeBrief'
          description: ''
    post:
      operationId: companies_attach_user_to_company_create
      description: Укажите `user_id` или `email` (ровно одно из полей). Только владелец
        компании.
      summary: Привязать пользователя к компании
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Компания.
        required: true
      tags:
      - companies
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkEmployee'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LinkEmployee'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LinkEmployee'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeBrief'
          description: ''
  /api/companies/{id}/detach-user-from-company/{employee_pk}/:
    delete:
      operationId: companies_detach_user_from_company_destroy
      description: Только владелец компании. Владельца отвязать нельзя.
      summary: Отвязать сотрудника от компании
      parameters:
      - in: path
        name: employee_pk
        schema:
          type: string
          pattern: ^\d+$
        required: true
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Компания.
        required: true
      tags:
      - companies
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/storages/:
    post:
      operationId: storages_create
      tags:
      - storages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Storage'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Storage'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Storage'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Storage'
          description: ''
  /api/storages/{id}/:
    get:
      operationId: storages_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Склад.
        required: true
      tags:
      - storages
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Storage'
          description: ''
    put:
      operationId: storages_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Склад.
        required: true
      tags:
      - storages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Storage'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Storage'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Storage'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Storage'
          description: ''
    patch:
      operationId: storages_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Склад.
        required: true
      tags:
      - storages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedStorage'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStorage'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStorage'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Storage'
          description: ''
    delete:
      operationId: storages_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Склад.
        required: true
      tags:
      - storages
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
components:
  schemas:
    Company:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        inn:
          type: string
          title: ИНН
          maxLength: 12
        title:
          type: string
          title: Название
          maxLength: 255
        owner:
          type: integer
          readOnly: true
          title: Владелец
      required:
      - id
      - inn
      - owner
      - title
    EmailTokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    EmployeeBrief:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Электронная почта
        company:
          type: integer
          readOnly: true
          nullable: true
          title: Компания
      required:
      - company
      - email
      - id
    LinkEmployee:
      type: object
      properties:
        user_id:
          type: integer
        email:
          type: string
          format: email
    PatchedCompany:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        inn:
          type: string
          title: ИНН
          maxLength: 12
        title:
          type: string
          title: Название
          maxLength: 255
        owner:
          type: integer
          readOnly: true
          title: Владелец
    PatchedStorage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        company:
          type: integer
          readOnly: true
          title: Компания
        address:
          type: string
          title: Адрес
          maxLength: 500
    Register:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          title: Электронная почта
          maxLength: 255
        password:
          type: string
          writeOnly: true
          title: Пароль
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          title: Подтверждение пароля
          minLength: 8
      required:
      - email
      - id
      - password
      - password_confirm
    Storage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        company:
          type: integer
          readOnly: true
          title: Компания
        address:
          type: string
          title: Адрес
          maxLength: 500
      required:
      - address
      - company
      - id
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
